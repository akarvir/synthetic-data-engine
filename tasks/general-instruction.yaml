name: general-instruction
domain: reasoning
description: Generate instruction-answer examples that teach clear reasoning on practical tasks.
difficulty:
  - easy
  - medium
  - hard
topics:
  - planning
  - analysis
  - writing
  - debugging
requirements:
  - The prompt must be specific and answerable.
  - The answer must be concrete and useful.
  - The item should include metadata with topic and difficulty.
output_schema:
  title: general_instruction_item
  type: object
  required:
    - prompt
    - answer
  properties:
    prompt:
      type: string
    answer:
      type: string
    metadata:
      type: object
selection:
  min_score: 0.8
